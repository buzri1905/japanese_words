<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오늘의 일본 요리</title>
<style>
  body {
    margin: 0;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", "Apple SD Gothic Neo", sans-serif;
  }
  .device {
    width: 800px;
    height: 480px;
    background: #fff;
    color: #000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .layout { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .stage {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 12px 24px 6px;
    box-sizing: border-box;
  }
  .head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .level {
    font-size: 11px;
    padding: 1px 6px;
    border: 1px solid #000;
    border-radius: 3px;
  }
  .title {
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
  }
  .title-ko {
    font-size: 13px;
    opacity: 0.65;
  }
  .servings {
    font-size: 12px;
    opacity: 0.7;
    margin-left: auto;
  }
  .date {
    font-size: 12px;
    opacity: 0.7;
    letter-spacing: 1px;
  }
  .desc {
    font-size: 14px;
    opacity: 0.75;
    line-height: 1.8;
    margin-top: 6px;
  }
  .desc ruby rt { font-size: 12px; font-weight: 500; }
  .body {
    display: flex;
    gap: 18px;
    margin-top: 8px;
    flex: 1;
    min-height: 0;
  }
  .col {
    display: flex;
    flex-direction: column;
  }
  .col.ingredients { flex: 0 0 36%; }
  .col.steps { flex: 1; border-left: 1px solid #000; padding-left: 16px; }
  .col-head {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 4px;
    padding-bottom: 2px;
    border-bottom: 1px solid #000;
  }
  .ing-list {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 13px;
    line-height: 1.95;
  }
  .ing-list li::before { content: "・ "; }
  .ing-list ruby rt { font-size: 11px; font-weight: 500; }
  .step-list {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 13px;
    line-height: 1.95;
    counter-reset: step;
  }
  .step-list li {
    padding-left: 22px;
    position: relative;
    margin-bottom: 2px;
  }
  .step-list li::before {
    counter-increment: step;
    content: counter(step);
    position: absolute;
    left: 0;
    top: 0;
    font-weight: 800;
    width: 16px;
    height: 16px;
    border: 1px solid #000;
    border-radius: 50%;
    text-align: center;
    font-size: 10px;
    line-height: 16px;
  }
  .step-list ruby rt { font-size: 11px; font-weight: 500; }
  .vocab {
    border-top: 1px solid #000;
    padding-top: 5px;
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 14px;
    font-size: 11px;
  }
  .vocab-head {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    opacity: 0.6;
    margin-right: 4px;
  }
  .v {
    display: inline-flex;
    gap: 3px;
    align-items: baseline;
    white-space: nowrap;
  }
  .v .vw { font-weight: 700; }
  .v .vr { opacity: 0.6; font-size: 9px; }
  .v .vm { opacity: 0.85; }
  .title_bar {
    height: 32px;
    border-top: 1px solid #000;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 13px;
    background: #000;
    color: #fff;
  }
  .title_bar .tb-title { font-weight: 700; }
  .title_bar .tb-instance { margin-left: auto; opacity: 0.8; }
  .err { padding: 40px; font-size: 14px; color: #900; }
</style>
</head>
<body>
<div class="device">
  <div class="layout">
    <div class="stage" id="stage"><div class="err">Loading…</div></div>
  </div>
  <div class="title_bar">
    <span class="tb-title">오늘의 일본 요리</span>
    <span class="tb-instance">レシピで日本語</span>
  </div>
</div>
<script>
fetch('./today.json', { cache: 'no-store' })
  .then(r => r.json())
  .then(data => {
    const stage = document.getElementById('stage');
    const r = data.recipe;
    const ingredients = r.ingredients.map(i => `<li>${i}</li>`).join('');
    const steps = r.steps.map(s => `<li>${s}</li>`).join('');
    const vocab = r.vocab_notes.map(n => `
      <span class="v">
        <span class="vw">${n.word}</span>
        <span class="vr">${n.reading}</span>
        <span class="vm">${n.meaning}</span>
      </span>
    `).join('');
    const desc = r.description ? `<div class="desc">${r.description}</div>` : '';
    stage.innerHTML = `
      <div class="head">
        <span class="level">${r.level}</span>
        <span class="title">${r.title}</span>
        <span class="title-ko">— ${r.title_meaning}</span>
        <span class="servings">${r.servings}</span>
        <span class="date">${data.date}</span>
      </div>
      ${desc}
      <div class="body">
        <div class="col ingredients">
          <div class="col-head">材料</div>
          <ul class="ing-list">${ingredients}</ul>
        </div>
        <div class="col steps">
          <div class="col-head">作り方</div>
          <ol class="step-list">${steps}</ol>
        </div>
      </div>
      <div class="vocab">
        <span class="vocab-head">단어</span>
        ${vocab}
      </div>
    `;
  })
  .catch(e => {
    document.getElementById('stage').innerHTML =
      `<div class="err">today.json을 불러오지 못했습니다: ${e}</div>`;
  });
</script>
</body>
</html>
